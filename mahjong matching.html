<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 麻雀配對訓練</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", "PingFang HK", Arial, sans-serif;
            background-color: #1a5e20; /* Classic felt green */
            background-image: 
                radial-gradient(circle, rgba(0,0,0,0.1) 2px, transparent 2px),
                radial-gradient(circle, rgba(0,0,0,0.1) 2px, transparent 2px);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            color: #ecf0f1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }

        /* Traditional Signboard Style */
        .signboard {
            background: linear-gradient(to bottom, #8B0000, #5c0000); /* Dark red wood */
            border: 4px solid #d4af37; /* Gold trim */
            border-radius: 8px;
            padding: 15px 40px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: inline-block;
        }

        .signboard h1 { 
            color: #d4af37; /* Metallic Gold */
            margin: 0; 
            font-size: 38px; 
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        #start-screen {
            background: rgba(0, 0, 0, 0.85);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #d4af37;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 50;
        }

        #start-screen p { font-size: 18px; line-height: 1.6; text-align: left; margin-bottom: 20px; }
        .highlight { color: #f1c40f; font-weight: bold; }

        #game-screen { display: none; flex-direction: column; align-items: center; }

        #stats-bar {
            background: #2c3e50;
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 25px;
            font-size: 18px;
            font-weight: bold;
            border: 2px solid #d4af37; /* Gold trim to match theme */
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        /* Action Buttons */
        .action-btn {
            padding: 8px 15px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            border: 2px solid transparent;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        .action-btn.shuffle { background-color: #3498db; }
        .action-btn.shuffle:hover { background-color: #2980b9; }
        
        .action-btn.home { background-color: #e74c3c; }
        .action-btn.home:hover { background-color: #c0392b; }

        /* The Wooden Mahjong Table */
        #game-board-container {
            background: #4a2f1d; /* Dark Walnut Wood */
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            border: 3px solid #2b180d;
        }

        #game-board {
            display: grid;
            gap: 4px;
            padding: 15px;
            background-color: #1a5e20; /* Inner table felt */
            border-radius: 8px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .tile {
            width: 55px;
            height: 75px;
            background-color: #fdfbf7;
            color: #2c3e50;
            border: 2px solid #bdc3c7;
            border-bottom-width: 6px; /* Makes it look 3D and thick */
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 36px;
            cursor: pointer;
            box-shadow: 2px 3px 5px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
            user-select: none;
        }

        .tile[data-suit="char"] { color: #e74c3c; }
        .tile[data-suit="bamboo"] { color: #27ae60; }
        .tile[data-suit="dot"] { color: #2980b9; }
        .tile[data-suit="honor"] { font-weight: bold; color: #2c3e50; }

        .tile:hover { transform: translateY(-4px); border-bottom-width: 2px; }

        .tile.selected {
            background-color: #fffacd; 
            border-color: #f1c40f;
            box-shadow: 0 0 15px #f1c40f;
            transform: scale(1.05);
            z-index: 10;
        }

        .tile.locked {
            cursor: not-allowed;
            background-color: #aeb6bf;
            color: #7f8c8d;
            border-color: #95a5a6;
            opacity: 0.8;
        }

        .tile.matched { visibility: hidden; }

        @keyframes flipTile {
            0% { transform: rotateY(0deg); opacity: 0.5; }
            50% { transform: rotateY(90deg); background-color: #f1c40f; }
            100% { transform: rotateY(0deg); opacity: 1; }
        }
        .shuffling { animation: flipTile 0.5s ease-in-out; }

        button.main-btn {
            padding: 12px 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            background-color: #d4af37; /* Gold button */
            color: #5c0000; /* Dark red text */
            border: 2px solid #fff;
            border-radius: 8px;
            transition: background 0.3s;
        }
        button.main-btn:hover { background-color: #f1c40f; }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 30px;
            border-radius: 10px;
            border: 2px solid #d4af37;
            display: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="signboard">
            <h1>🀄 雀 館 智 能 配 對</h1>
        </div>
        <p>歡迎來到認知訓練系統。本遊戲旨在訓練您的<span class="highlight">視覺掃描</span>與<span class="highlight">執行功能</span>。</p>
        <p><strong>玩法指示：</strong><br>
        1. 找出兩張圖案相同的麻雀牌並點擊它們。<br>
        2. 只有<span class="highlight">「自由牌」</span>才能被點擊（左右沒有被阻擋）。被阻擋的牌會顯示為灰色。<br>
        3. 盡快配對所有麻雀牌。</p>
        <button class="main-btn" onclick="initGame()">開始遊戲</button>
    </div>

    <div id="game-screen">
        <div id="stats-bar">
            <div>等級: <span id="level-display" style="color:#f1c40f;">1</span></div>
            <div>錯誤: <span id="error-display">0</span></div>
            <div>計時: <span id="time-display">0</span>s</div>
            <button class="action-btn shuffle" onclick="forceManualShuffle()">🔄 洗牌</button>
            <button class="action-btn home" onclick="returnToHome()">🏠 主頁</button>
        </div>
        
        <div id="game-board-container">
            <div id="game-board"></div>
        </div>
    </div>

    <div id="game-over">
        <h2 id="ai-title">回合完成！</h2>
        <p id="ai-feedback" style="font-size: 18px; line-height: 1.5;"></p>
        <button class="main-btn" onclick="startRound()">下一回合</button>
        <button class="action-btn home" onclick="returnToHome()" style="margin-left:10px;">🏠 主頁</button>
    </div>

    <script>
        let currentLevel = 1;
        let errorsThisRound = 0;
        let startTime;
        let timerInterval;
        let tilesRemaining = 0;
        let selectedTile = null;

        const tilePairs = [
            ['🀇', 'char'], ['🀈', 'char'], ['🀉', 'char'],
            ['🀄', 'honor'], ['🀆', 'honor'], ['🀀', 'honor'], 
            ['🀙', 'dot'], ['🀚', 'dot'], ['🀛', 'dot'],
            ['🀐', 'bamboo'], ['🀑', 'bamboo'], ['🀒', 'bamboo']
        ];

        const levels = {
            1: { rows: 4, cols: 4, maxTime: 45, maxErr: 2 },
            2: { rows: 4, cols: 6, maxTime: 70, maxErr: 3 },
            3: { rows: 6, cols: 6, maxTime: 110, maxErr: 4 },
            4: { rows: 6, cols: 8, maxTime: 150, maxErr: 5 }
        };

        function initGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            currentLevel = 1;
            startRound();
        }

        // --- NEW: Return to Home Function ---
        function returnToHome() {
            clearInterval(timerInterval); // Stop the clock
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('game-over').style.display = 'none';
            document.getElementById('start-screen').style.display = 'block';
        }

        function startRound() {
            document.getElementById('game-over').style.display = 'none';
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            
            errorsThisRound = 0;
            selectedTile = null;
            document.getElementById('error-display').innerText = errorsThisRound;
            document.getElementById('level-display').innerText = currentLevel;
            
            const config = levels[currentLevel];
            board.style.gridTemplateColumns = `repeat(${config.cols}, 1fr)`;

            let fullSet = [];
            const pairsRequired = (config.rows * config.cols) / 2;
            for(let i=0; i < pairsRequired; i++) {
                let pairIdx = i % tilePairs.length; 
                fullSet.push(tilePairs[pairIdx]);
                fullSet.push(tilePairs[pairIdx]);
            }

            fullSet.sort(() => Math.random() - 0.5);
            tilesRemaining = fullSet.length;

            for(let r=0; r < config.rows; r++) {
                for(let c=0; c < config.cols; c++) {
                    const info = fullSet.pop();
                    createTile(r, c, info[0], info[1]);
                }
            }

            updateTilesStatus();
            
            let safety = 0;
            while (!checkAvailableMoves() && safety < 5) {
                executeSmartShuffle();
                safety++;
            }
            startTimer();
        }

        function createTile(row, col, symbol, suit) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            tile.innerText = symbol;
            tile.id = `tile-${row}-${col}`;
            tile.dataset.row = row;
            tile.dataset.col = col;
            tile.dataset.suit = suit;
            tile.dataset.symbol = symbol;
            tile.addEventListener('click', handleTileClick);
            document.getElementById('game-board').appendChild(tile);
        }

        function handleTileClick(event) {
            const tile = event.target;
            if (tile.classList.contains('locked') || tile.classList.contains('matched')) return;

            if (selectedTile === null) {
                selectedTile = tile;
                tile.classList.add('selected');
            } else if (selectedTile === tile) {
                selectedTile.classList.remove('selected');
                selectedTile = null;
            } else {
                if (tile.dataset.symbol === selectedTile.dataset.symbol) {
                    matchTiles(selectedTile, tile);
                } else {
                    errorsThisRound++;
                    document.getElementById('error-display').innerText = errorsThisRound;
                    selectedTile.classList.remove('selected');
                }
                selectedTile = null;
            }
        }

        function matchTiles(t1, t2) {
            t1.classList.remove('selected');
            t1.classList.add('matched');
            t2.classList.add('matched');
            tilesRemaining -= 2;

            updateTilesStatus();

            if (tilesRemaining === 0) {
                endRound();
            } else if (!checkAvailableMoves()) {
                setTimeout(() => {
                    alert("🤖 AI 分析：檢測到死局！系統已自動重新洗牌。");
                    executeSmartShuffle();
                }, 300);
            }
        }

        function updateTilesStatus() {
            const tiles = document.querySelectorAll('.tile:not(.matched)');
            tiles.forEach(t => {
                const r = parseInt(t.dataset.row);
                const c = parseInt(t.dataset.col);
                const left = document.getElementById(`tile-${r}-${c-1}`);
                const right = document.getElementById(`tile-${r}-${c+1}`);

                const hasLeft = left && !left.classList.contains('matched');
                const hasRight = right && !right.classList.contains('matched');

                if (!hasLeft || !hasRight) {
                    t.classList.remove('locked');
                } else {
                    t.classList.add('locked');
                }
            });
        }

        function checkAvailableMoves() {
            const free = Array.from(document.querySelectorAll('.tile:not(.locked):not(.matched)'));
            for (let i = 0; i < free.length; i++) {
                for (let j = i + 1; j < free.length; j++) {
                    if (free[i].dataset.symbol === free[j].dataset.symbol) return true;
                }
            }
            return false;
        }

        function forceManualShuffle() {
            executeSmartShuffle();
        }

        function executeSmartShuffle() {
            const remaining = Array.from(document.querySelectorAll('.tile:not(.matched)'));
            const free = remaining.filter(t => !t.classList.contains('locked'));

            if (free.length >= 2) {
                let dataPool = remaining.map(t => ({ symbol: t.dataset.symbol, suit: t.dataset.suit }));
                
                let counts = {};
                let target = null;
                for (let d of dataPool) {
                    counts[d.symbol] = (counts[d.symbol] || 0) + 1;
                    if (counts[d.symbol] === 2) { target = d; break; }
                }

                if (target) {
                    let removed = 0;
                    dataPool = dataPool.filter(d => {
                        if (d.symbol === target.symbol && removed < 2) { removed++; return false; }
                        return true;
                    });
                    
                    dataPool.sort(() => Math.random() - 0.5);

                    free[0].dataset.symbol = target.symbol;
                    free[0].dataset.suit = target.suit;
                    free[0].innerText = target.symbol;

                    free[1].dataset.symbol = target.symbol;
                    free[1].dataset.suit = target.suit;
                    free[1].innerText = target.symbol;

                    let i = 0;
                    remaining.forEach(t => {
                        if (t !== free[0] && t !== free[1]) {
                            t.dataset.symbol = dataPool[i].symbol;
                            t.dataset.suit = dataPool[i].suit;
                            t.innerText = dataPool[i].symbol;
                            i++;
                        }
                        t.classList.remove('selected');
                        t.classList.add('shuffling');
                        setTimeout(() => t.classList.remove('shuffling'), 500);
                    });
                }
            }
            selectedTile = null;
            updateTilesStatus();
        }

        function startTimer() {
            clearInterval(timerInterval);
            startTime = Date.now();
            timerInterval = setInterval(() => {
                document.getElementById('time-display').innerText = Math.floor((Date.now() - startTime) / 1000);
            }, 1000);
        }

        function endRound() {
            clearInterval(timerInterval);
            const time = Math.floor((Date.now() - startTime) / 1000);
            const config = levels[currentLevel];
            let fb = `⏱️ 耗時: ${time} 秒<br>❌ 錯誤: ${errorsThisRound} 次<br><br>`;

            if (errorsThisRound === 0 && time < config.maxTime) {
                if (currentLevel < 4) {
                    currentLevel++;
                    fb += "🤖 AI 分析：表現優異！已升級難度。";
                } else {
                    fb += "🤖 AI 分析：完美通關！已達最高難度。";
                }
            } else if (errorsThisRound > config.maxErr || time > config.maxTime + 15) {
                if (currentLevel > 1) {
                    currentLevel--;
                    fb += "🤖 AI 分析：已為您降低難度，請放鬆心情。";
                } else {
                    fb += "🤖 AI 分析：請保持節奏，慢慢尋找。";
                }
            } else {
                fb += "🤖 AI 分析：表現穩定，維持當前難度。";
            }

            document.getElementById('ai-feedback').innerHTML = fb;
            document.getElementById('game-over').style.display = 'block';
        }
    </script>
</body>
</html>
